<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Village Christian Church</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-banner">
        <p class="hero-subtitle">West Village Christian Church</p>
        <h1 class="hero-title">Rooted in Faith. Driven by Missions.</h1>
    </header> 

    <div class="forms-wrapper">
        <section id="connect-card" class="form-card">
            <h2>Visitor Connect Card</h2>
            <form id="visitorForm">
                <div class="form-group"><label>Full Name *</label><input type="text" name="fullName" required class="form-control"></div>
                <div class="form-group"><label>Email Address *</label><input type="email" name="email" required class="form-control"></div>
                <button type="submit" class="btn btn-primary">Submit Connect Card</button>
            </form>
        </section>

        <section id="prayer-requests" class="form-card">
            <h2>Prayer Request Box</h2>
            <form id="prayerForm">
                <div class="form-group"><label>Your Request *</label><textarea name="prayerRequest" required class="form-control"></textarea></div>
                <button type="submit" class="btn btn-secondary">Submit Prayer Request</button>
            </form>
        </section>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzihO9Zh3M3t52URRMQNJWguE5Jt_1Ad-ve3qAlYygneNBs1i3IKx_-FZ1eEpKcto0zWA/exec';

        function setupForm(formId, successMsg) {
            const form = document.getElementById(formId);
            if (!form) return;
            form.addEventListener('submit', e => {
                e.preventDefault();
                const btn = form.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerText = 'Sending...';

                fetch(scriptURL, { 
                    method: 'POST', 
                    body: new URLSearchParams(new FormData(form)) 
                })
                .then(() => {
                    alert(successMsg);
                    form.reset();
                })
                .catch(err => alert('Error! Please try again.'))
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = formId === 'visitorForm' ? 'Submit Connect Card' : 'Submit Prayer Request';
                });
            });
        }

        setupForm('visitorForm', 'Thank you! Your submission has been received.');
        setupForm('prayerForm', 'Your prayer request has been received.');
    </script>
</body>
</html>
