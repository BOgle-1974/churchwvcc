<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Village Christian Church</title>
    <link rel="stylesheet" href="style.css">
</head> 
<body>
    <header class="hero-banner">
        <p class="hero-subtitle">West Village Christian Church</p>
        <h1 class="hero-title">Rooted in Faith. Driven by Missions.</h1>
    </header> 

    <div class="forms-wrapper">
        <!-- Visitor Connect Column -->
        <div class="form-column">
            <section id="connect-card" class="form-card">
                <h2 class="visitor-title">Visitor Connect Card</h2>
                <form id="visitorForm">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="fullName" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" name="email" required class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Connect Card</button>
                </form>
            </section>
        </div>

        <!-- Prayer Request Column -->
        <div class="form-column">
            <section id="prayer-requests" class="form-card">
                <h2 class="prayer-title">Prayer Request Box</h2>
                <form id="prayerForm">
                    <div class="form-group">
                        <label>Your Request *</label>
                        <textarea name="prayerRequest" required class="form-control" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-secondary">Submit Prayer Request</button>
                </form>
            </section>
        </div>
    </div>

    <script>
        // Update this URL to match your active deployment URL
        const scriptURL = 'https://script.google.com/macros/library/d/1KmmEA9aKNRxgv_KMO6e1sI6kgT3KN54LBKps8OHWxRuLWfgk5wgzNZM1/19';

        function handleFormSubmit(formId) {
            const form = document.getElementById(formId);
            form.addEventListener('submit', e => {
                e.preventDefault();
                const btn = form.querySelector('button');
                const originalText = btn.textContent;
                btn.textContent = 'Submitting...';
                btn.disabled = true;
                
                fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                    .then(response => {
                        alert('Success! Your information has been submitted.');
                        form.reset();
                        btn.textContent = originalText;
                        btn.disabled = false;
                    })
                    .catch(error => {
                        console.error('Error!', error.message);
                        alert('Error! Please try again.');
                        btn.textContent = originalText;
                        btn.disabled = false;
                    });
            });
        }

        // Initialize both forms
        handleFormSubmit('visitorForm');
        handleFormSubmit('prayerForm');
    </script>
</body>
</html>
