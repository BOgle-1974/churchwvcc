<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Village Christian Church</title>
</head> 
<body>
    <h1>West Village Christian Church</h1>

    <!-- Visitor Connect Card -->
    <section>
        <h2>Visitor Connect Card</h2>
        <form id="visitorForm">
            <input type="text" name="fullName" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="Phone">
            <select name="isFirstTime">
                <option value="Yes">First time visiting? Yes</option>
                <option value="No">First time visiting? No</option>
            </select>
            <input type="text" name="howHeard" placeholder="How did you hear about us?">
            <select name="contactMethod">
                <option value="Email">Contact via Email</option>
                <option value="Phone">Contact via Phone</option>
            </select>
            <textarea name="comments" placeholder="Comments"></textarea>
            <button type="submit">Submit Visitor Info</button>
        </form>
    </section>

    <!-- Prayer Request Box -->
    <section>
        <h2>Prayer Request Box</h2>
        <form id="prayerForm">
            <input type="text" name="fullName" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="Phone">
            <textarea name="prayerRequest" placeholder="Prayer Request or Praise" required></textarea>
            <select name="isPrivate">
                <option value="No">Keep private? No</option>
                <option value="Yes">Keep private? Yes</option>
            </select>
            <button type="submit">Submit Prayer Request</button>
        </form>
    </section>

    <!-- Donation Form -->
    <section>
        <h2>Make a Donation</h2>
        <form id="donationForm">
            <input type="text" name="fullName" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="address" placeholder="Home Address">
            <input type="text" name="city" placeholder="City">
            <input type="text" name="state" placeholder="State">
            <input type="text" name="zip" placeholder="Zip Code">
            <input type="tel" name="phone" placeholder="Phone Number">
            <input type="number" name="amount" placeholder="Donation Amount" required>
            <select name="fund">
                <option value="General Fund">General Church Fund</option>
                <option value="CCAM">Cambodian Christian Arts (CCAM)</option>
                <option value="Food Pantry">Willing Workers Food Pantry</option>
            </select>
            <button type="submit">Submit Donation</button>
        </form>
    </section>

    <script>
        // REPLACE THIS URL WITH YOUR NEW WEB APP URL AFTER DEPLOYING
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx71tGeQlOQrt2J-1Jw78pNKQvId1vzcK3IgcCKI26LAGqEDRNHy8MykL2cn2_1KSFO_A/exec';

        function setupForm(id) {
            const form = document.getElementById(id);
            form.addEventListener('submit', e => {
                e.preventDefault();
                fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                    .then(() => { 
                        alert('Success! Your information has been submitted.'); 
                        form.reset(); 
                    })
                    .catch(err => {
                        console.error('Error!', err.message);
                        alert('There was an error. Please ensure you have deployed as a new version.');
                    });
            });
        }

        setupForm('visitorForm');
        setupForm('prayerForm');
        setupForm('donationForm');
    </script>
</body>
</html>
